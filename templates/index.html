<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion AI Detector</title>

    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- FLOATING DOODLES -->
<img src="https://cdn-icons-png.flaticon.com/512/742/742888.png" class="doodle">
<img src="https://cdn-icons-png.flaticon.com/512/742/742927.png" class="doodle">
<img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" class="doodle">
<img src="https://cdn-icons-png.flaticon.com/512/742/742920.png" class="doodle">
<img src="https://cdn-icons-png.flaticon.com/512/742/742774.png" class="doodle">

<div class="container">
    <h1>🧠 Emotion Detection AI</h1>
    <p>✨ Analyze emotions in real-time ✨</p>

    <div class="card">
        <input type="text" id="textInput" placeholder="Type or speak..." />

        <br>

        <button onclick="detectEmotion()">🚀 Analyze</button>
        <button onclick="startVoice()">🎤 Speak</button>
        <button onclick="toggleTheme()">🌙 Toggle</button>
        <button onclick="downloadResult()">⬇️ Download</button>

        <div id="loader" class="loader" style="display:none;"></div>

        <div id="result"></div>

        <canvas id="emotionChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let chart;

// 🎤 VOICE INPUT
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.onresult = function(event) {
        document.getElementById("textInput").value = event.results[0][0].transcript;
    };
    recognition.start();
}

// 🌙 DARK MODE
function toggleTheme() {
    document.body.classList.toggle("dark");
}

// 📥 DOWNLOAD RESULT
function downloadResult() {
    let text = document.getElementById("result").innerText;
    let blob = new Blob([text], { type: "text/plain" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "emotion_result.txt";
    link.click();
}

// 🚀 MAIN FUNCTION
function detectEmotion() {
    let text = document.getElementById("textInput").value;

    if (!text.trim()) {
        alert("Enter text");
        return;
    }

    document.getElementById("loader").style.display = "block";

    fetch("/emotionDetector", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "text=" + encodeURIComponent(text)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("loader").style.display = "none";

        if (!data || data.error) {
            document.getElementById("result").innerHTML = "Error!";
            return;
        }

        document.getElementById("result").innerHTML =
            `🎯 Dominant Emotion: <b>${data.dominant_emotion}</b>`;

        const labels = Object.keys(data.emotion);
        const values = Object.values(data.emotion);

        const ctx = document.getElementById("emotionChart").getContext("2d");

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: "Emotion Scores",
                    data: values
                }]
            }
        });
    });
}
</script>

</body>
</html>
